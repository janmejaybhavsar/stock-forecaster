version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit
    volumes:
      - app-data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATA_PROVIDER=yfinance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-data:
